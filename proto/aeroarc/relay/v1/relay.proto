syntax = "proto3";

package aeroarc.relay.v1;

import "aeroarc/agent/v1/agent.proto";

option go_package = "github.com/aero-arc/aero-arc-protos/gen/go/aeroarc/relay/v1;relayv1";

// RelayControl exposes control-plane APIs for observing and updating live
// agent sessions managed by a relay. It is consumed by aero-arc-api.
service RelayControl {

  // List all drones currently connected to this relay.
  rpc ListActiveDrones(ListActiveDronesRequest)
      returns (ListActiveDronesResponse);

  // Get the current status of a single drone by drone_id.
  rpc GetDroneStatus(GetDroneStatusRequest)
      returns (GetDroneStatusResponse);

  // Set and durably confirm the active operation context on an agent.
  rpc SetOperationContext(SetOperationContextRequest)
      returns (SetOperationContextResponse);

  // Clear and durably confirm the active operation context on an agent.
  rpc ClearOperationContext(ClearOperationContextRequest)
      returns (ClearOperationContextResponse);
}

// ----- Requests -----

message ListActiveDronesRequest {
  // Reserved for future filters (region, flight_id, etc.)
}

message GetDroneStatusRequest {
  string drone_id = 1;
}

message SetOperationContextRequest {
  string agent_id = 1;
  aeroarc.agent.v1.SetOperationContextCommand command = 2;
}

message ClearOperationContextRequest {
  string agent_id = 1;
  aeroarc.agent.v1.ClearOperationContextCommand command = 2;
}

// ----- Responses -----

message ListActiveDronesResponse {
  repeated DroneStatus drones = 1;
}

message GetDroneStatusResponse {
  DroneStatus drone = 1;
}

// A successful RPC response means the relay received an acknowledgement from
// the target agent. Transport, offline-agent, and deadline failures are
// returned as gRPC errors instead.
message SetOperationContextResponse {
  aeroarc.agent.v1.OperationContextCommandAck result = 1;
}

// A successful RPC response means the relay received an acknowledgement from
// the target agent. Inspect result.status for the application outcome.
message ClearOperationContextResponse {
  aeroarc.agent.v1.OperationContextCommandAck result = 1;
}

// ----- Core Types -----

// DroneStatus represents the relay's authoritative view
// of a live drone session.
message DroneStatus {
  // Stable drone identifier
  string drone_id = 1;

  // Server-issued session identifier
  string session_id = 2;

  // Agent identifier that registered this session
  string agent_id = 3;

  // Relay identifier (useful when aggregated by the API)
  string relay_id = 4;

  // Unix timestamp (nanoseconds) when the session was created
  int64 connected_at_unix_ns = 5;

  // Unix timestamp (nanoseconds) of last observed heartbeat/telemetry
  int64 last_heartbeat_unix_ns = 6;

  // Optional flight grouping (client-defined)
  string flight_id = 7;

  // Active intent context reported by the connected agent.
  string intent_id = 8;
  uint32 intent_version = 9;
}
